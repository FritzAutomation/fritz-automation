<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48" width="520" height="96">
  <!-- Dark variant: for use on dark backgrounds -->
  <!-- Terminal window background -->
  <rect x="0" y="4" width="44" height="40" rx="5" fill="#1a1a2e" stroke="#334155" stroke-width="1" />
  <!-- Title bar -->
  <rect x="0" y="4" width="44" height="13" rx="5" fill="#16213e" stroke="#334155" stroke-width="1" />
  <rect x="0" y="12" width="44" height="5" fill="#16213e" />
  <!-- Traffic light dots -->
  <circle cx="8" cy="10.5" r="2.2" fill="#ff5f57" />
  <circle cx="15" cy="10.5" r="2.2" fill="#febc2e" />
  <circle cx="22" cy="10.5" r="2.2" fill="#28c840" />
  <!-- >_ prompt -->
  <text x="6" y="35" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" font-weight="700" fill="#00d97e">&gt;_</text>
  <!-- "Fritz" -->
  <text x="56" y="33" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#00d97e" letter-spacing="-0.5">Fritz</text>
  <!-- "Automation" -->
  <text x="104" y="33" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#f8fafc" letter-spacing="-0.3">Automation</text>
</svg>
